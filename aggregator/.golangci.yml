version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errchkjson
    - errorlint
    - gosec
    - govet
    - noctx
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - forcetypeassert
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
          - gosec
